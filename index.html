<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GUMIZY – 3D Product Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #f0ede8;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 28px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .page-title {
      font-size: 11px;
      color: #444;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .hero {
      padding: 48px 28px 32px;
      text-align: center;
    }

    .hero h1 {
      font-size: 32px;
      font-weight: 200;
      letter-spacing: 0.06em;
      line-height: 1.2;
    }

    .hero h1 strong {
      font-weight: 700;
    }

    .hero p {
      margin-top: 10px;
      font-size: 13px;
      color: #444;
      letter-spacing: 0.08em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      padding: 24px 28px 48px;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      display: block;
      text-decoration: none;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover {
      border-color: #333;
      transform: translateY(-2px);
    }

    .card-thumb {
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    .card-thumb.green { background: radial-gradient(ellipse, #1a2a0a 0%, #0a0a0a 100%); }
    .card-thumb.orange { background: radial-gradient(ellipse, #2a1a0a 0%, #0a0a0a 100%); }
    .card-thumb.blue { background: radial-gradient(ellipse, #0a1a2a 0%, #0a0a0a 100%); }

    .card-body {
      padding: 18px 20px;
      border-top: 1px solid #1e1e1e;
    }

    .card-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 6px;
    }

    .card-name {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .card-name.green { color: #c8f542; }
    .card-name.orange { color: #f5a442; }
    .card-name.blue { color: #42c8f5; }

    .card-cta {
      margin-top: 14px;
      font-size: 11px;
      color: #444;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-cta::after {
      content: '→';
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">GUMIZY</div>
    <div class="page-title">3D Product Gallery</div>
  </header>

  <div class="hero">
    <h1>Explore <strong>GUMIZY</strong><br>in 3D</h1>
    <p>Pilih produk untuk melihat model 3D interaktif</p>
  </div>

  <div class="grid">
    <a href="fixed-final.html" class="card">
      <div class="card-thumb green">📦</div>
      <div class="card-body">
        <div class="card-label">Produk 01</div>
        <div class="card-name green">Kotak Kemasan</div>
        <div class="card-cta">Lihat 3D</div>
      </div>
    </a>

    <a href="jelly-nocard.html" class="card">
      <div class="card-thumb orange">🧃</div>
      <div class="card-body">
        <div class="card-label">Produk 02</div>
        <div class="card-name orange">Produk</div>
        <div class="card-cta">Lihat 3D</div>
      </div>
    </a>

    <a href="flowpack-final.html" class="card">
      <div class="card-thumb blue">🌊</div>
      <div class="card-body">
        <div class="card-label">Produk 03</div>
        <div class="card-name blue">Kemasan Satuan</div>
        <div class="card-cta">Lihat 3D</div>
      </div>
    </a>
  </div>

</body>
</html>
